<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>گالری</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: Arial, sans-serif;
    }

    .page {
      width: min(1200px, calc(100% - 40px));
      margin: 20px auto 0;
    }

    .breadcrumb {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #777;
    }

    .breadcrumb a {
      color: #000;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: #3498db;
    }

    .breadcrumb span {
      color: #3498db;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 32px 0 24px;
    }

    .filter-btn {
      border: 1px solid #3498db;
      background: #fff;
      color: #3498db;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      transition: 0.25s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: #3498db;
      color: #fff;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 200px);
      gap: 20px;
      justify-content: center;
    }

    .gallery-item {
      width: 200px;
      height: 200px;
      border: 0;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .gallery-item:hover {
      transform: scale(1.1);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      z-index: 1;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.65);
    }

    .modal.open {
      display: flex;
    }

    .modal-box {
      width: min(560px, 90vw);
      height: min(560px, 70vh);
      border: 8px solid #fff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-close {
      position: fixed;
      top: 22px;
      left: 22px;
      border: 0;
      background: #fff;
      color: #000;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
    }

    .site-footer {
      margin-top: 64px;
      padding: 34px 0;
      border-top: 1px solid #edf1f5;
      background: #f8fafc;
      color: #7a7f87;
    }

    .site-footer__inner {
      width: min(1140px, calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .site-footer__brand {
      margin: 0;
      color: #111;
      font-size: 18px;
      font-weight: 700;
    }

    .site-footer__text {
      margin: 6px 0 0;
      color: #7a7f87;
      font-size: 14px;
      line-height: 1.8;
    }

    .site-footer__copy {
      color: #7a7f87;
      font-size: 14px;
      white-space: nowrap;
    }

    @media (max-width: 920px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 200px);
      }
    }

    @media (max-width: 520px) {
      .gallery-grid {
        grid-template-columns: 200px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="breadcrumb"><a href="index.html">خانه</a> &gt; <span>گالری</span></p>

    <section class="filters" aria-label="فیلتر گالری">
      <button class="filter-btn active" data-filter="all">همه</button>
      <button class="filter-btn" data-filter="nature">طبیعت</button>
      <button class="filter-btn" data-filter="city">شهری</button>
      <button class="filter-btn" data-filter="abstract">انتزاعی</button>
    </section>

    <section class="gallery-grid" aria-label="تصاویر گالری">
      <button class="gallery-item" data-category="nature" style="background:#2ecc71" aria-label="تصویر طبیعت 1"></button>
      <button class="gallery-item" data-category="city" style="background:#3498db" aria-label="تصویر شهری 1"></button>
      <button class="gallery-item" data-category="abstract" style="background:#9b59b6" aria-label="تصویر انتزاعی 1"></button>
      <button class="gallery-item" data-category="nature" style="background:#f1c40f" aria-label="تصویر طبیعت 2"></button>
      <button class="gallery-item" data-category="city" style="background:#e67e22" aria-label="تصویر شهری 2"></button>
      <button class="gallery-item" data-category="abstract" style="background:#e84393" aria-label="تصویر انتزاعی 2"></button>
      <button class="gallery-item" data-category="nature" style="background:#1abc9c" aria-label="تصویر طبیعت 3"></button>
      <button class="gallery-item" data-category="city" style="background:#34495e" aria-label="تصویر شهری 3"></button>
    </section>
  </main>

  <div class="modal" id="modal" aria-hidden="true">
    <button class="modal-close" id="modalClose" aria-label="بستن">×</button>
    <div class="modal-box" id="modalBox"></div>
  </div>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <div>
        <p class="site-footer__brand">Pouria Baghban</p>
        <p class="site-footer__text">Design and development of digital experiences</p>
      </div>
      <span class="site-footer__copy">© 2026</span>
    </div>
  </footer>

  <script>
    const filterButtons = document.querySelectorAll(".filter-btn");
    const galleryItems = document.querySelectorAll(".gallery-item");
    const modal = document.getElementById("modal");
    const modalBox = document.getElementById("modalBox");
    const modalClose = document.getElementById("modalClose");

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const filter = button.dataset.filter;

        filterButtons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");

        galleryItems.forEach((item) => {
          const shouldShow = filter === "all" || item.dataset.category === filter;
          item.style.display = shouldShow ? "block" : "none";
        });
      });
    });

    galleryItems.forEach((item) => {
      item.addEventListener("click", () => {
        modalBox.style.background = item.style.background;
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
      });
    });

    function closeModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    modalClose.addEventListener("click", closeModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });
  </script>
</body>
</html>
