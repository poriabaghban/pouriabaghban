  .kskh-shell::before {

    pointer-events: none;
    background:
      radial-gradient(circle at 20% 25%, rgba(0, 255, 179, 0.32), transparent 28%),

    opacity: 0.92;
    animation: kskhGradientMove 14s ease-in-out infinite alternate;
  }

  .kskh-shell::after {
    content: "";

    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),

  }

  @keyframes kskhGradientMove {

      transform: translate3d(-2%, -2%, 0) scale(1);
      background-position: 0% 45%;
    }

    50% {
      transform: translate3d(2%, 1%, 0) scale(1.05);
      background-position: 100% 50%;
    }

    100% {
      transform: translate3d(-1%, 2%, 0) scale(1.08);
      background-position: 35% 100%;
    }
