<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزئیات پست - بلاگ</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/all.min 2.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/cs001 (6).css">
    <style>
        /* Align post page with main theme variables */
        .post-header {
            background: linear-gradient(135deg, color-mix(in srgb, var(--accent-color), transparent 50%) 0%, color-mix(in srgb, var(--accent-color), transparent 10%) 100%);
            padding: 60px 0 30px;
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
        }

        .post-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            color: var(--contrast-color, #fff);
            margin-bottom: 12px;
        }

        .post-meta { color: color-mix(in srgb, var(--default-color), transparent 40%); font-size: 14px; margin-top: 12px; }

        .post-content {
            max-width: 900px;
            margin: 40px auto;
            background: var(--surface-color);
            padding: 30px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            line-height: 1.8;
            font-size: 16px;
            color: var(--default-color);
        }

        .post-content h2 {
            font-size: 26px;
            font-weight: 700;
            color: var(--heading-color);
            margin: 24px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid color-mix(in srgb, var(--accent-color), transparent 70%);
        }

        .post-content p { margin-bottom: 12px; }

        .comment-section {
            max-width: 900px;
            margin: 30px auto 80px;
            padding: 24px;
            background: var(--surface-color);
            border-radius: 8px;
            border-top: 3px solid var(--accent-color);
        }

        .comment-section h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--heading-color);
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid color-mix(in srgb, var(--accent-color), transparent 70%);
        }

        .comment-form { display:flex; flex-direction:column; gap:16px; }

        .form-group { display:flex; flex-direction:column; }

        .form-group label { color: var(--default-color); font-weight:600; margin-bottom:8px; font-size:14px; }

        .form-group input, .form-group textarea {
            padding: 10px 12px;
            background: color-mix(in srgb, var(--surface-color), transparent 10%);
            border: 1px solid color-mix(in srgb, var(--accent-color), transparent 85%);
            border-radius: 6px;
            color: var(--default-color);
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input::placeholder, .form-group textarea::placeholder { color: color-mix(in srgb, var(--default-color), transparent 50%); }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px color-mix(in srgb, var(--accent-color), transparent 80%);
        }

        .char-counter { display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:12px; color: color-mix(in srgb, var(--default-color), transparent 50%); }

        .char-counter .count { color: var(--accent-color); font-weight:600; }

        textarea { resize: vertical; min-height:120px; max-height:300px; }

        .submit-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--accent-color) 0%, color-mix(in srgb, var(--accent-color), black 10%) 100%);
            color: var(--contrast-color);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            align-self: flex-start;
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px color-mix(in srgb, var(--accent-color), transparent 70%); }

        .submit-btn.loading { opacity: 0.8; cursor: not-allowed; }

        .success-message { padding:12px; background: color-mix(in srgb, #4caf50, transparent 85%); border-left:4px solid #4caf50; border-radius:6px; color:#4caf50; margin-bottom:12px; display:none; }
        .error-message { padding:12px; background: color-mix(in srgb, #f44336, transparent 85%); border-left:4px solid #f44336; border-radius:6px; color:#f44336; margin-bottom:12px; display:none; }

        .back-link { display:inline-block; margin-bottom:20px; color: var(--accent-color); text-decoration:none; font-weight:600; transition: transform 0.2s; }
        .back-link:hover { transform: translateX(6px); }
    </style>
    <script src="assets/js/include-partials.js" defer></script>
</head>
<body>
    <div id="site-header"></div>

    <main class="container" style="margin-top: 40px; margin-bottom: 40px;">
        <a href="blog.html" class="back-link"><i class="fas fa-arrow-right"></i> بازگشت به بلاگ</a>

        <div class="post-header" id="postHeader">
            <!-- Post header will be inserted here -->
        </div>

        <div class="post-content" id="postContent">
            <!-- Post content will be inserted here -->
        </div>

        <div class="comment-section">
            <h2>نظر خود را درج کنید</h2>
            
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i> نظر شما با موفقیت ارسال شد!
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> مشکلی پیش آمد، لطفاً دوباره تلاش کنید.
            </div>

            <form class="comment-form" id="commentForm">
                <div class="form-group">
                    <label for="nameInput">نام شما:</label>
                    <input type="text" id="nameInput" name="name" placeholder="نام خود را وارد کنید" required>
                </div>

                <div class="form-group">
                    <label for="emailInput">ایمیل شما:</label>
                    <input type="email" id="emailInput" name="email" placeholder="ایمیل خود را وارد کنید" required>
                </div>

                <div class="form-group">
                    <label for="commentInput">نظر شما (حداکثر 400 کاراکتر):</label>
                    <textarea id="commentInput" name="comment" placeholder="نظر خود را بنویسید..." maxlength="400" required></textarea>
                    <div class="char-counter">
                        <span>نویسی‌های باقی:</span>
                        <span class="count"><span id="charCount">0</span>/400</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn">ارسال نظر</button>
            </form>
        </div>
    </main>

    <div id="site-footer"></div>

    <a href="#" id="up-to-top">↑</a>

    <script>
        // Blog posts data
        const blogPosts = [
            {
                id: 1,
                title: 'شروع با React',
                excerpt: 'یادگیری مبانی React و ساخت اولین کامپوننت‌های شما',
                content: '<h2>Introduction</h2><p>React is one of the most popular JavaScript libraries for building user interfaces. It is currently used by thousands of developers around the world.</p><h2>React Benefits</h2><p>React offers many advantages for developers, including high performance, reusable components, and easier debugging.</p><p>With React, you can build single-page applications (SPAs) with strong performance.</p>',
                author: 'Pouria Baghban',
                date: '1403/09/15',
                emoji: '⚛️'
            },
            {
                id: 2,
                title: 'بهترین روش‌های JavaScript',
                excerpt: 'نکات عملی برای نوشتن کد بهتر و قابل نگهداری',
                content: '<h2>Introduction</h2><p>Writing clean and maintainable code is one of the most important skills for a developer. In this article, we review best practices and useful patterns.</p><h2>Key Points</h2><p>1. Use meaningful names for variables and functions</p><p>2. Split code into small, single-purpose functions</p><p>3. Use clear and helpful comments</p><p>4. Avoid duplicated code (DRY - Don\'t Repeat Yourself)</p>',
                author: 'Pouria Baghban',
                date: '1403/09/10',
                emoji: '🚀'
            },
            {
                id: 3,
                title: 'CSS Grid و Flexbox',
                excerpt: 'راهنمای کامل برای طراحی تجاوبی مدرن',
                content: '<h2>مقدمه</h2><p>طراحی تجاوبی امروزه ضروری است. CSS Grid و Flexbox دو ابزار قدرتمند هستند که می‌توان از آنها برای ایجاد طرح‌های زیبا و انعطاف‌پذیر استفاده کرد.</p><h2>Flexbox</h2><p>Flexbox برای ساخت طرح‌های یک‌بعدی (سطر یا ستون) بسیار مناسب است. می‌توانید به‌راحتی عناصر را تراز کنید و فاصله‌های میان آنها را کنترل کنید.</p><h2>CSS Grid</h2><p>CSS Grid برای ساخت طرح‌های دوبعدی مناسب است. با استفاده از Grid، می‌توانید سطرها و ستون‌ها را تعریف کنید و عناصر را درون آنها قرار دهید.</p>',
                author: 'Pouria Baghban',
                date: '1403/09/05',
                emoji: '🎨'
            },
            {
                id: 4,
                title: 'API RESTful و Node.js',
                excerpt: 'ساخت یک سرور Node.js تمام عیار',
                content: '<h2>مقدمه</h2><p>Node.js یک محیط اجرای JavaScript سمت سرور است. در این آموزش، ما یاد خواهیم گرفت چگونه یک API RESTful کامل بسازیم.</p><h2>آغاز کار</h2><p>برای شروع، باید Node.js را بر روی سیستم خود نصب کنید. سپس می‌توانید یک پروژه جدید را ایجاد کنید و وابستگی‌های لازم را نصب کنید.</p><h2>ساخت API</h2><p>استفاده از Express.js ساخت یک API RESTful را بسیار آسان می‌کند. می‌توانید route‌ها را تعریف کنید و پاسخ‌های مناسب را برگردانید.</p>',
                author: 'Pouria Baghban',
                date: '1403/08/30',
                emoji: '🔧'
            }
        ];

        // Get post ID from URL
        function getPostId() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id'));
        }

        // Render post content
        function renderPost() {
            const postId = getPostId();
            const post = blogPosts.find(p => p.id === postId);

            if (!post) {
                document.getElementById('postHeader').innerHTML = '<p style="color: var(--accent-color); text-align: center;">پست مورد نظر یافت نشد</p>';
                return;
            }

            document.getElementById('postHeader').innerHTML = `
                <h1>${post.title}</h1>
                <div class="post-meta">
                    <div class="post-meta-item">
                        <i class="fas fa-user"></i>
                        <span>${post.author}</span>
                    </div>
                    <div class="post-meta-item">
                        <i class="fas fa-calendar"></i>
                        <span>${post.date}</span>
                    </div>
                </div>
            `;

            document.getElementById('postContent').innerHTML = post.content;

            // Store post data for comment submission
            window.currentPost = post;
        }

        // Character counter
        const commentInput = document.getElementById('commentInput');
        const charCount = document.getElementById('charCount');
        const charCounter = document.querySelector('.char-counter');

        commentInput.addEventListener('input', (e) => {
            const count = e.target.value.length;
            charCount.textContent = count;

            if (count > 350) {
                charCounter.classList.add('warning');
            } else {
                charCounter.classList.remove('warning');
            }
        });

        // Form submission
        document.getElementById('commentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const postId = getPostId();
            const post = blogPosts.find(p => p.id === postId);

            const name = document.getElementById('nameInput').value;
            const email = document.getElementById('emailInput').value;
            const comment = document.getElementById('commentInput').value;
            const submitBtn = document.querySelector('.submit-btn');

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'در حال ارسال...';

            try {
                // Use FormSubmit.co service for email
                const formData = new FormData();
                formData.append('name', name);
                formData.append('email', email);
                formData.append('comment', comment);
                formData.append('post_title', post.title);
                formData.append('post_link', window.location.href);
                formData.append('_subject', `نظر جدید برای پست: ${post.title}`);
                formData.append('_captcha', 'false');

                const response = await fetch('https://formsubmit.co/poriab426@gmail.com', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('commentForm').reset();
                    charCount.textContent = '0';

                    setTimeout(() => {
                        document.getElementById('successMessage').style.display = 'none';
                    }, 5000);
                } else {
                    throw new Error('خطا در ارسال');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMessage').style.display = 'block';

                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 5000);
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.textContent = 'ارسال نظر';
            }
        });

        // Scroll to top
        document.getElementById('up-to-top').addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Render post on page load
        renderPost();
    </script>
</body>
</html>
