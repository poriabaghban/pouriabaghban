{% extends "base.html" %}

{% block title %}{{ category.name }}{% endblock %}

{% block content %}
<main class="container py-5">
  <div class="mb-4">
    <a class="btn btn-sm btn-outline-secondary mb-3" href="{% url 'downloads:home' %}">Back</a>
    <h1 class="h2">{{ category.name }}</h1>
    {% if category.description %}<p class="text-muted">{{ category.description }}</p>{% endif %}
  </div>
  <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
    {% for item in items %}
      {% include "downloads/_item_card.html" %}
    {% endfor %}
  </div>
</main>
{% endblock %}
