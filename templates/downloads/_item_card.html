<div class="col">
  <article class="card h-100 shadow-sm">
    <div class="card-body d-flex flex-column">
      <div class="d-flex justify-content-between gap-2 align-items-start mb-2">
        <h3 class="h5 mb-0">{{ item.title }}</h3>
        <span class="badge text-bg-primary">{{ item.get_platform_display }}</span>
      </div>
      <div class="small text-muted mb-2">
        {% if item.version %}Version {{ item.version }} · {% endif %}{{ item.file_size_display }}
      </div>
      <p class="card-text flex-grow-1">{{ item.description|default:"No description available."|truncatewords:28 }}</p>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-primary btn-sm" href="{% url 'downloads:item_detail' item.slug %}">Details</a>
      </div>
    </div>
  </article>
</div>
