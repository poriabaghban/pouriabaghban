<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Pouria Baghban</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/all.min 2.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/cs001 (6).css">
        
    <style>
        /* Color variables - Match main theme */
        :root {
            --accent-color: #667eea;
            --contrast-color: #fff;
            --default-color: #333;
            --heading-color: #333;
            --surface-color: #fff;
        }

        /* Use site theme variables to keep consistent styling */
         
        .gallery-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--contrast-color, #fff);
            margin-bottom: 12px;
            animation: fadeInUp 0.6s ease-out;
        }

        .gallery-header p {
            color: color-mix(in srgb, var(--default-color), transparent 30%);
            font-size: 16px;
            animation: fadeInUp 0.6s ease-out 0.15s both;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }

        .gallery-card {
            background: var(--surface-color);
            color: var(--default-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
            box-shadow: 0 6px 18px rgba(0,0,0,0.04);
            border: 1px solid color-mix(in srgb, var(--accent-color), transparent 85%);
            animation: slideUp 0.5s ease-out;
        }

        .gallery-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 40px color-mix(in srgb, var(--accent-color), transparent 70%);
            border-color: var(--accent-color);
        }

        .gallery-card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--accent-color) 0%, color-mix(in srgb, var(--accent-color), black 20%) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--contrast-color);
            overflow: hidden;
            position: relative;
        }

        .gallery-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }

        .gallery-card:hover .gallery-card-image img {
            transform: scale(1.05);
        }

        .gallery-card-image::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
            animation: shimmer 3s infinite;
        }

        .gallery-card-content {
            padding: 20px;
        }

        .gallery-card-date {
            color: var(--accent-color);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .gallery-card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--heading-color);
            margin-bottom: 10px;
            transition: color 0.25s ease;
        }

        .gallery-card:hover .gallery-card-title {
            color: var(--accent-color);
        }

        .gallery-card-description {
            color: color-mix(in srgb, var(--default-color), transparent 30%);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .gallery-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid color-mix(in srgb, var(--accent-color), transparent 90%);
        }

        .gallery-card-category {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: color-mix(in srgb, var(--default-color), transparent 30%);
        }

        .gallery-card-view {
            color: var(--accent-color);
            font-size: 12px;
            font-weight: 600;
            transition: transform 0.25s ease, color 0.25s ease;
        }

        .gallery-card-view:hover {
            transform: translateX(-5px);
            color: color-mix(in srgb, var(--accent-color), black 10%);
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px);} to { opacity: 1; transform: translateY(0);} }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px);} to { opacity: 1; transform: translateY(0);} }
        @keyframes slideUp { from { opacity: 0; transform: translateY(18px);} to { opacity: 1; transform: translateY(0);} }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Lightbox styles */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
        }

        .lightbox-prev {
            left: -60px;
        }

        .lightbox-next {
            right: -60px;
        }
    </style>
    <script src="assets/js/include-partials.js" defer></script>
</head>
<body>
    <!-- Header disabled -->
    <!-- <div id="site-header"></div> -->

    <main class="container" style="margin-top: 40px; margin-bottom: 80px;">
        <!-- Back to home button -->
        <div style="margin-bottom: 20px;">
            <a href="/" style="display: inline-block; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">← بازگشت به صفحه اصلی</a>
        </div>

        <div class="gallery-header">
            <h1><span id="typed-word"></span><span class="cursor" aria-hidden="true">|</span></h1>
            <p>مجموعه‌ای از تصاویر و پروژه‌های من</p>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery items will be inserted here by JavaScript -->
        </div>
    </main>

    <!-- Lightbox for viewing images -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
        <div class="lightbox-content">
            <img id="lightboxImage" src="" alt="">
        </div>
        <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
    </div>

    <div id="site-footer"></div>

    <a href="#" id="up-to-top">↑</a>

    <script>
        // Gallery items data
        const galleryItems = [
            {
                id: 1,
                title: 'پروژه وب‌سایت شخصی',
                description: 'طراحی و توسعه وب‌سایت شخصی با استفاده از HTML, CSS و JavaScript',
                category: 'وب‌سایت',
                date: '1403/09/15',
                image: 'assets/images/image.png'
            },
            {
                id: 2,
                title: 'اپلیکیشن موبایل',
                description: 'توسعه اپلیکیشن موبایل با React Native',
                category: 'اپلیکیشن',
                date: '1403/09/10',
                image: 'assets/images/image.png'
            },
            {
                id: 3,
                title: 'طراحی رابط کاربری',
                description: 'طراحی UI/UX برای سیستم مدیریت محتوا',
                category: 'طراحی',
                date: '1403/09/05',
                image: 'assets/images/image.png'
            },
            {
                id: 4,
                title: 'پروژه Node.js',
                description: 'ساخت API RESTful با Node.js و Express',
                category: 'بک‌اند',
                date: '1403/08/30',
                image: 'assets/images/image.png'
            },
            {
                id: 5,
                title: 'پروژه React',
                description: 'توسعه اپلیکیشن تک‌صفحه‌ای با React',
                category: 'فرانت‌اند',
                date: '1403/08/25',
                image: 'assets/images/image.png'
            },
            {
                id: 6,
                title: 'پایگاه داده',
                description: 'طراحی و پیاده‌سازی پایگاه داده MySQL',
                category: 'پایگاه داده',
                date: '1403/08/20',
                image: 'assets/images/image.png'
            }
        ];

        // Render gallery items
        function renderGalleryItems() {
            const galleryGrid = document.getElementById('galleryGrid');
            galleryGrid.innerHTML = galleryItems.map(item => `
                <div class="gallery-card" onclick="openLightbox(${item.id})">
                    <div class="gallery-card-image">
                        <img src="${item.image}" alt="${item.title}" loading="lazy">
                    </div>
                    <div class="gallery-card-content">
                        <div class="gallery-card-date">${item.date}</div>
                        <h3 class="gallery-card-title">${item.title}</h3>
                        <p class="gallery-card-description">${item.description}</p>
                        <div class="gallery-card-footer">
                            <div class="gallery-card-category">
                                <i class="fas fa-tag"></i>
                                <span>${item.category}</span>
                            </div>
                            <div class="gallery-card-view">مشاهده <i class="fas fa-arrow-left"></i></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Lightbox functionality
        let currentImageIndex = 0;

        function openLightbox(id) {
            const item = galleryItems.find(item => item.id === id);
            if (!item) return;

            currentImageIndex = galleryItems.indexOf(item);
            document.getElementById('lightboxImage').src = item.image;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function showPrevImage() {
            currentImageIndex = (currentImageIndex - 1 + galleryItems.length) % galleryItems.length;
            document.getElementById('lightboxImage').src = galleryItems[currentImageIndex].image;
        }

        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % galleryItems.length;
            document.getElementById('lightboxImage').src = galleryItems[currentImageIndex].image;
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function(){
            renderGalleryItems();

            document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
            document.getElementById('lightboxPrev').addEventListener('click', showPrevImage);
            document.getElementById('lightboxNext').addEventListener('click', showNextImage);

            // Close lightbox on background click
            document.getElementById('lightbox').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeLightbox();
                }
            });

            // Keyboard navigation
            document.addEventListener('keydown', function(e) {
                if (!document.getElementById('lightbox').classList.contains('active')) return;

                switch(e.key) {
                    case 'Escape':
                        closeLightbox();
                        break;
                    case 'ArrowLeft':
                        showPrevImage();
                        break;
                    case 'ArrowRight':
                        showNextImage();
                        break;
                }
            });

            // Scroll to footer
            const up = document.getElementById('up-to-top');
            if (up) {
                up.addEventListener('click', (e) => {
                    e.preventDefault();
                    const footer = document.querySelector('#site-footer');
                    if (footer) {
                        footer.scrollIntoView({ behavior: 'smooth' });
                    } else {
                        // اگر فوتر پیدا نشد، به آخر صفحه برو
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }
                });
            }

            // Typewriter animation for frontend/backend
            const words = ['front end','back end'];
            let current = 0;
            let charIndex = 0;
            let isDeleting = false;

            function tick(){
                const el = document.getElementById('typed-word');
                if (!el) return;
                const full = words[current];

                if (!isDeleting){
                    charIndex++;
                    el.textContent = full.substring(0, charIndex);
                    if (charIndex === full.length){
                        isDeleting = true;
                        setTimeout(tick, 900);
                        return;
                    }
                } else {
                    charIndex--;
                    el.textContent = full.substring(0, charIndex);
                    if (charIndex === 0){
                        isDeleting = false;
                        current = (current + 1) % words.length;
                    }
                }

                const delay = isDeleting ? 60 : 120;
                setTimeout(tick, delay);
            }

            setTimeout(tick, 300);
        });
    </script>



    <script>
// Typewriter effect
(function(){
  const words = ['Front-End', 'Back-End', 'Full Stack'];
  let current = 0;
  let charIndex = 0;
  let isDeleting = false;

  function tick(){
    const el = document.getElementById('typed-word');
    if (!el) return;
    const full = words[current];

    if (!isDeleting){
      charIndex++;
      el.textContent = full.substring(0, charIndex);
      if (charIndex === full.length){
        isDeleting = true;
        setTimeout(tick, 1200);
        return;
      }
    } else {
      charIndex--;
      el.textContent = full.substring(0, charIndex);
      if (charIndex === 0){
        isDeleting = false;
        current = (current + 1) % words.length;
      }
    }

    const delay = isDeleting ? 60 : 120;
    setTimeout(tick, delay);
  }

  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(tick, 300);
  });
})();

// Comment form handler
document.addEventListener('DOMContentLoaded', function() {
  const commentInput = document.querySelector('#mainPageCommentForm textarea');
  if (commentInput) {
    commentInput.addEventListener('input', (e) => {
      document.getElementById('mainPageCharCount').textContent = e.target.value.length;
    });
  }

  const mainForm = document.getElementById('mainPageCommentForm');
  if (mainForm) {
    mainForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = mainForm.querySelector('input[name="name"]').value;
      const email = mainForm.querySelector('input[name="email"]').value;
      const comment = mainForm.querySelector('textarea[name="comment"]').value;
      const submitBtn = mainForm.querySelector('button[type="submit"]');

      submitBtn.style.opacity = '0.7';
      submitBtn.style.cursor = 'not-allowed';
      submitBtn.textContent = 'در حال ارسال...';

      try {
        const formData = new FormData();
        formData.append('name', name);
        formData.append('email', email);
        formData.append('comment', comment);
        formData.append('_subject', 'نظر جدید از صفحه اصلی');
        formData.append('_captcha', 'false');

        const response = await fetch('https://formsubmit.co/poriab426@gmail.com', {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          document.getElementById('mainPageSuccessMessage').style.display = 'block';
          mainForm.reset();
          document.getElementById('mainPageCharCount').textContent = '0';

          setTimeout(() => {
            document.getElementById('mainPageSuccessMessage').style.display = 'none';
          }, 5000);
        } else {
          throw new Error('خطا در ارسال');
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('mainPageErrorMessage').style.display = 'block';

        setTimeout(() => {
          document.getElementById('mainPageErrorMessage').style.display = 'none';
        }, 5000);
      } finally {
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
        submitBtn.textContent = '✉️ ارسال نظر';
      }
    });
  }

  // Animate skills bars
  const bars = document.querySelectorAll('.progress .progress-bar');
  bars.forEach(el => {
    if (!el.style.width || el.style.width === '0%') {
      if (!el.style.transition) el.style.transition = 'width 1.5s ease-in-out';
      el.dataset.animated = 'false';
    }
  });

  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.querySelectorAll('.progress .progress-bar').forEach(el => {
          if (el.dataset.animated === 'true') return;
          el.style.width = el.getAttribute('aria-valuenow') + '%';
          el.dataset.animated = 'true';
        });
        obs.unobserve(entry.target);
      });
    }, { threshold: 0.2 });

    document.querySelectorAll('.skills-animation').forEach(el => observer.observe(el));
  }
});
</script>

<style>
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor { animation: blink 1s infinite; }
</style>
